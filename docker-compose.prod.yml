# Surcharge de docker-compose.yml pour la production :
# usage : docker compose -f docker-compose.yml -f docker-compose.prod.yml up
services:
  web:
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    environment:
      RUN_MIGRATIONS: "1"
      DJANGO_SETTINGS_MODULE: config.settings.prod
    volumes: []  # image figée, pas de bind mount du code
    ports: []
    expose: ["8000"]

  worker:
    command: celery -A config worker -l info -Q default,scraping,llm,deliverables,social --concurrency=4
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod

  beat:
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    ports: ["80:80"]
    depends_on: [web]

  # Monitoring Celery optionnel. TODO: ajouter `flower` à requirements/prod.txt si activé.
  flower:
    build: .
    command: celery -A config flower --port=5555
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    depends_on: [redis]
    ports: ["5555:5555"]

volumes:
  static_volume: {}
  media_volume: {}

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: veille
      POSTGRES_PASSWORD: veille
      POSTGRES_DB: veille
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veille"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    env_file: .env
    environment:
      RUN_MIGRATIONS: "1"
    volumes: [".:/app"]
    ports: ["8000:8000"]
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}

  worker:
    build: .
    command: celery -A config worker -l info -Q default,scraping,llm,deliverables,social
    env_file: .env
    depends_on: [db, redis]

  beat:
    build: .
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    depends_on: [db, redis]

volumes: {pgdata: {}}

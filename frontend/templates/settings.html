{% extends "base.html" %}
{% block title %}Réglages — Veille{% endblock %}
{% block content %}
<div class="page-header"><h1 class="page-title">Réglages</h1></div>
<div class="card reading-column">
  <form method="post" action="{% url 'settings' %}">
    {% csrf_token %}
    <div class="field">
      <label for="active_llm_provider">Provider LLM actif</label>
      <select id="active_llm_provider" name="active_llm_provider">
        {% for value, label in provider_choices %}
        <option value="{{ value }}" {% if value == config.active_llm_provider %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field">
      <label for="active_llm_model">Modèle actif</label>
      <input type="text" id="active_llm_model" name="active_llm_model" value="{{ config.active_llm_model }}">
    </div>
    <div class="field">
      <label for="provider_api_base_url">URL de base du provider</label>
      <input type="url" id="provider_api_base_url" name="provider_api_base_url" value="{{ config.provider_api_base_url }}" placeholder="https://api.openai.com/v1 (laisser vide pour l'URL par défaut)">
      <span class="field-help">Laissez vide pour utiliser l'URL par défaut du provider.</span>
    </div>
    <div class="field">
      <label for="max_documents_per_session">Documents max par session</label>
      <input type="number" id="max_documents_per_session" name="max_documents_per_session" value="{{ config.max_documents_per_session }}" min="1">
    </div>
    <div class="field">
      <label for="max_sources_per_spontaneous">Sources max (mode spontané)</label>
      <input type="number" id="max_sources_per_spontaneous" name="max_sources_per_spontaneous" value="{{ config.max_sources_per_spontaneous }}" min="1">
    </div>
    <div class="field">
      <label>
        <input type="checkbox" name="twitter_enabled" {% if config.twitter_enabled %}checked{% endif %}>
        Activer la section X / Twitter
      </label>
    </div>
    <div class="field">
      <label for="twitter_display_delay_hours">Décalage d'affichage Twitter (heures)</label>
      <input type="number" id="twitter_display_delay_hours" name="twitter_display_delay_hours" value="{{ config.twitter_display_delay_hours }}" min="0">
    </div>
    <button class="btn btn-primary" type="submit">Enregistrer</button>
    {% if saved %}<span class="banner banner-info" style="margin-left:var(--space-3);">Enregistré.</span>{% endif %}
  </form>
</div>
{% endblock %}

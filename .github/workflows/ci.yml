name: CI
on: [push, pull_request]
jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: {POSTGRES_USER: veille, POSTGRES_PASSWORD: veille, POSTGRES_DB: veille_test}
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U veille" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SQL_ENGINE: django.db.backends.postgresql
      SQL_DATABASE: veille_test
      SQL_USER: veille
      SQL_PASSWORD: veille
      SQL_HOST: localhost
      SQL_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      DJANGO_SECRET_KEY: ci-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install -r requirements/dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy .
      - run: lint-imports          # import-linter : frontières entre apps
      - run: python manage.py makemigrations --check --dry-run
      - run: pytest --cov=apps --cov-report=xml --cov-fail-under=80
      - run: pip-audit -r requirements/base.txt
      - uses: docker/build-push-action@v6
        with: {context: ., push: false}

  # Sur tag v* uniquement (après succès de `quality`) : publie l'image sur
  # GHCR et génère la release + changelog (§12).
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
